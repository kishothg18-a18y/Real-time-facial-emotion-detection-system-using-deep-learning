<!DOCTYPE html>
<html>
<head>
    <title>Voice Recording</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
        }

        canvas {
            width: 100%;
            height: 150px;
            background: black;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2>🎤 Voice Emotion Recording</h2>
    <h4>Patient: {{ patient_id }}</h4>

    <p id="statusText" class="mt-3">Click Start to Record</p>
    <h4 id="emotionDisplay" class="mt-3 text-success">
    Waiting for emotion...
    </h4>


    <canvas id="waveCanvas"></canvas>

    <div class="mt-4">
        <button class="btn btn-success" onclick="startRecording()">Start Recording</button>
        <button class="btn btn-danger" onclick="stopRecording()">Stop Recording</button>
    </div>

    <br>
    <a href="{{ url_for('therapist_dashboard') }}" class="btn btn-secondary mt-3">Back</a>

</div>


<script>

const socket = io();
let mediaRecorder;
let audioContext;
let analyser;
let dataArray;
let animationId;
let patientId = "{{ patient_id }}";

function startRecording() {

    document.getElementById("statusText").innerText =
        "🎤 Recording... Live emotion detecting...";

    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {

            // Setup Wave Animation
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);

            source.connect(analyser);
            analyser.fftSize = 256;

            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            drawWave();

            // Setup Real-Time Streaming
            mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });


            mediaRecorder.start(1000);  // Send every 1 second

            mediaRecorder.ondataavailable = event => {

                const reader = new FileReader();
                reader.readAsDataURL(event.data);

                reader.onloadend = function() {

                    const base64data = reader.result.split(',')[1];

                    socket.emit("audio_chunk", {
                        audio: base64data,
                        patient_id: patientId
                    });
                };
            };
        });
}

function stopRecording() {

    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        cancelAnimationFrame(animationId);
        document.getElementById("statusText").innerText =
            "🛑 Recording stopped.";
    }
}

function drawWave() {

    const canvas = document.getElementById("waveCanvas");
    const canvasCtx = canvas.getContext("2d");

    canvas.width = window.innerWidth * 0.8;

    function draw() {

        animationId = requestAnimationFrame(draw);

        analyser.getByteFrequencyData(dataArray);

        canvasCtx.fillStyle = "black";
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

        let barWidth = (canvas.width / dataArray.length) * 2.5;
        let barHeight;
        let x = 0;

        for (let i = 0; i < dataArray.length; i++) {
            barHeight = dataArray[i];

            canvasCtx.fillStyle = "lime";
            canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

            x += barWidth + 1;
        }
    }

    draw();
}

socket.on("emotion_result", function(data) {

    document.getElementById("statusText").innerText =
        "🧠 Live Emotion: " + data.emotion +
        " (" + (data.confidence * 100).toFixed(2) + "%)";
});

</script>

</body>
</html>
