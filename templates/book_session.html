<!-- templates/book_session.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Session</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Book Session</h2>
    <a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary mb-3">Back to Dashboard</a>

    <form method="POST" class="card p-3 bg-white">
        <div class="mb-3">
            <label for="therapist" class="form-label">Select Therapist</label>
            <select name="therapist" id="therapist" class="form-select" required>
                {% for email, name in therapists %}
                    <option value="{{ email }}">{{ name }} ({{ email }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="session_time" class="form-label">Session Time</label>
            <input type="datetime-local" name="session_time" id="session_time" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="notes" class="form-label">Notes (optional)</label>
            <textarea name="notes" id="notes" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Book Session</button>
    </form>
</div>
</body>
</html>
